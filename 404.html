<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Meeting Not Found</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --secondary: #06b6d4;
            --accent: #f472b6;
            --dark: #0f172a;
            --dark-light: #1e293b;
            --dark-lighter: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --success: #22c55e;
            --warning: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            color: var(--text-primary);
        }

        /* Animated Background */
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 25% 25%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 75% 75%, rgba(6, 182, 212, 0.06) 0%, transparent 50%);
            pointer-events: none;
        }

        /* Floating Calendar Cards */
        .floating-card {
            position: fixed;
            border-radius: 16px;
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(99, 102, 241, 0.15);
            backdrop-filter: blur(10px);
            padding: 1rem;
            pointer-events: none;
            animation: cardFloat 6s ease-in-out infinite;
        }

        .floating-card .card-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .floating-card .card-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .floating-card .card-title {
            font-size: 0.7rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .floating-card .card-time {
            font-size: 0.6rem;
            color: var(--text-secondary);
            opacity: 0.7;
        }

        .card-1 {
            top: 15%;
            left: 8%;
            animation-delay: 0s;
            transform: rotate(-8deg);
        }

        .card-1 .card-dot { background: var(--primary); }

        .card-2 {
            top: 20%;
            right: 10%;
            animation-delay: -2s;
            transform: rotate(5deg);
        }

        .card-2 .card-dot { background: var(--secondary); }

        .card-3 {
            bottom: 20%;
            left: 12%;
            animation-delay: -4s;
            transform: rotate(6deg);
        }

        .card-3 .card-dot { background: var(--accent); }

        .card-4 {
            bottom: 15%;
            right: 8%;
            animation-delay: -1s;
            transform: rotate(-5deg);
        }

        .card-4 .card-dot { background: var(--warning); }

        @keyframes cardFloat {
            0%, 100% { transform: translateY(0) rotate(var(--r, 0deg)); }
            50% { transform: translateY(-20px) rotate(var(--r, 0deg)); }
        }

        /* Orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.25;
            pointer-events: none;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: var(--primary);
            top: -20%;
            right: -10%;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: var(--secondary);
            bottom: -15%;
            left: -10%;
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
            max-width: 650px;
            width: 100%;
        }

        /* Calendar Icon Animation */
        .calendar-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 2rem;
            position: relative;
            opacity: 0;
            animation: fadeInUp 0.7s ease forwards 0.1s;
        }

        .calendar-icon svg {
            width: 100%;
            height: 100%;
            animation: gentleBounce 3s ease-in-out infinite;
        }

        @keyframes gentleBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Status Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 1rem;
            background: rgba(244, 114, 182, 0.1);
            border: 1px solid rgba(244, 114, 182, 0.3);
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 1.5rem;
            opacity: 0;
            animation: fadeInUp 0.7s ease forwards 0.2s;
        }

        .status-badge .pulse {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        /* Error Code */
        .error-code {
            font-size: clamp(6rem, 15vw, 10rem);
            font-weight: 800;
            line-height: 1;
            margin-bottom: 0.5rem;
            opacity: 0;
            animation: fadeInUp 0.7s ease forwards 0.3s;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--primary-light) 50%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.03em;
        }

        /* Meeting Room Display */
        .meeting-room {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 16px;
            padding: 1.25rem 1.5rem;
            margin: 1.5rem auto;
            max-width: 380px;
            text-align: left;
            opacity: 0;
            animation: fadeInUp 0.7s ease forwards 0.5s;
            position: relative;
            overflow: hidden;
        }

        .meeting-room::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, var(--accent), var(--primary));
        }

        .meeting-room .room-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
        }

        .meeting-room .room-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .meeting-room .room-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--accent);
        }

        .meeting-room .room-status svg {
            width: 16px;
            height: 16px;
            animation: shake 0.5s ease-in-out infinite alternate;
        }

        @keyframes shake {
            from { transform: rotate(-10deg); }
            to { transform: rotate(10deg); }
        }

        /* Subtitle */
        .subtitle {
            font-size: clamp(1.3rem, 3vw, 1.8rem);
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.75rem;
            opacity: 0;
            animation: fadeInUp 0.7s ease forwards 0.6s;
        }

        .description {
            font-size: clamp(0.9rem, 2vw, 1.05rem);
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 2rem;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
            opacity: 0;
            animation: fadeInUp 0.7s ease forwards 0.7s;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Suggested Actions */
        .suggestions {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 2rem;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
            opacity: 0;
            animation: fadeInUp 0.7s ease forwards 0.8s;
        }

        .suggestion-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(99, 102, 241, 0.1);
            border-radius: 12px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            transition: all 0.3s ease;
        }

        .suggestion-item:hover {
            background: rgba(99, 102, 241, 0.08);
            border-color: rgba(99, 102, 241, 0.25);
            transform: translateX(5px);
        }

        .suggestion-item .sugg-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .suggestion-item .sugg-icon svg {
            width: 16px;
            height: 16px;
        }

        .sugg-icon.primary { background: rgba(99, 102, 241, 0.15); color: var(--primary-light); }
        .sugg-icon.secondary { background: rgba(6, 182, 212, 0.15); color: var(--secondary); }
        .sugg-icon.accent { background: rgba(244, 114, 182, 0.15); color: var(--accent); }

        /* Buttons */
        .buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            opacity: 0;
            animation: fadeInUp 0.7s ease forwards 0.9s;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 1.75rem;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.35);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.45);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-primary);
            border: 2px solid var(--dark-lighter);
        }

        .btn-secondary:hover {
            border-color: var(--primary-light);
            background: rgba(99, 102, 241, 0.08);
            transform: translateY(-2px);
        }

        .btn svg {
            width: 18px;
            height: 18px;
        }

        /* Animated Clock Hands on 404 */
        .clock-hands {
            display: inline-block;
            position: relative;
            width: 1.2em;
            height: 1.2em;
            vertical-align: middle;
            margin-left: 0.1em;
        }

        /* Scanlines */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0) 50%, rgba(0,0,0,0.015) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 5;
        }

        /* Mobile */
        @media (max-width: 640px) {
            .container {
                padding: 1.5rem;
            }
            
            .floating-card {
                display: none;
            }
            
            .buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 100%;
                max-width: 280px;
                justify-content: center;
            }
            
            .calendar-icon {
                width: 80px;
                height: 80px;
            }
            
            .meeting-room {
                margin: 1rem 1rem;
            }
        }

        /* Reduced Motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="scanlines"></div>

    <!-- Floating Calendar Cards -->
    <div class="floating-card card-1" style="--r: -8deg;">
        <div class="card-header">
            <div class="card-dot"></div>
            <span class="card-title">Team Standup</span>
        </div>
        <span class="card-time">9:00 AM - 9:30 AM</span>
    </div>
    
    <div class="floating-card card-2" style="--r: 5deg;">
        <div class="card-header">
            <div class="card-dot"></div>
            <span class="card-title">Product Review</span>
        </div>
        <span class="card-time">2:00 PM - 3:00 PM</span>
    </div>
    
    <div class="floating-card card-3" style="--r: 6deg;">
        <div class="card-header">
            <div class="card-dot"></div>
            <span class="card-title">Design Sync</span>
        </div>
        <span class="card-time">11:00 AM - 11:45 AM</span>
    </div>
    
    <div class="floating-card card-4" style="--r: -5deg;">
        <div class="card-header">
            <div class="card-dot"></div>
            <span class="card-title">Sprint Planning</span>
        </div>
        <span class="card-time">4:00 PM - 5:30 PM</span>
    </div>

    <!-- Main Content -->
    <div class="container">
        <!-- Calendar Icon -->
        <div class="calendar-icon">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Calendar Body -->
                <rect x="15" y="25" width="70" height="60" rx="10" fill="rgba(30,41,59,0.8)" stroke="url(#calGrad)" stroke-width="2"/>
                
                <!-- Calendar Top -->
                <rect x="15" y="15" width="70" height="20" rx="8" fill="url(#calGrad)"/>
                
                <!-- Rings -->
                <rect x="28" y="8" width="6" height="14" rx="3" fill="var(--dark-lighter)"/>
                <rect x="66" y="8" width="6" height="14" rx="3" fill="var(--dark-lighter)"/>
                
                <!-- Calendar Grid Lines -->
                <line x1="25" y1="48" x2="75" y2="48" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
                <line x1="25" y1="62" x2="75" y2="62" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
                <line x1="25" y1="76" x2="75" y2="76" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
                <line x1="38" y1="42" x2="38" y2="82" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
                <line x1="51" y1="42" x2="51" y2="82" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
                <line x1="64" y1="42" x2="64" y2="82" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
                
                <!-- X Mark (cancelled) -->
                <circle cx="50" cy="62" r="14" fill="rgba(244,114,182,0.15)" stroke="var(--accent)" stroke-width="2"/>
                <line x1="44" y1="56" x2="56" y2="68" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round"/>
                <line x1="56" y1="56" x2="44" y2="68" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round"/>
                
                <!-- Gradients -->
                <defs>
                    <linearGradient id="calGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#6366f1"/>
                        <stop offset="100%" stop-color="#06b6d4"/>
                    </linearGradient>
                </defs>
            </svg>
        </div>

        <!-- Error Code -->
        <div class="error-code">404</div>

        <!-- Meeting Room Card -->
        <div class="meeting-room">
            <div class="room-label">Scheduled Room</div>
            <div class="room-name">Conference Room A — Page Not Found</div>
            <div class="room-status">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
                This meeting room does not exist or has been removed
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="buttons">
            <a href="index.html" class="btn btn-primary">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
                Home
            </a>
         <a href="javascript:void(0);" onclick="history.back();" class="btn btn-secondary">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
    </svg>
    Back
</a>
        </div>
    </div>
</body>
</html>
